<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OFFICIEL | CEM 4 MBOUR - Excellence & Discipline</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Plus+Jakarta+Sans', sans-serif; }
    :root { --brand: #1e40af; }
    .header-active { background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 0.75rem 1.5rem; }
    /* Animation pour le chargement */
    .loader { border-top-color: #1e40af; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

  <header id="main-nav" class="fixed w-full z-[100] transition-all duration-500 py-6 px-8 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Coat_of_arms_of_Senegal.svg" class="h-10 w-auto" alt="Sénégal">
      <div class="leading-none">
        <h1 class="text-lg font-extrabold tracking-tighter uppercase">CEM 4 <span class="text-blue-700">MBOUR</span></h1>
        <p class="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase">Ministère de l'Éducation Nationale</p>
      </div>
    </div>
    <nav class="hidden lg:flex items-center gap-8 text-[11px] font-extrabold uppercase tracking-widest text-slate-600">
      <a href="#accueil" class="hover:text-blue-700 transition">Accueil</a>
      <a href="#compositions" class="hover:text-blue-700 transition">Compositions</a>
      <a href="#contact" class="bg-blue-700 text-white px-6 py-3 rounded-full hover:bg-blue-800 transition">Contact</a>
    </nav>
  </header>

  <section id="accueil" class="relative min-h-screen flex items-center pt-20 bg-slate-900 overflow-hidden">
    <div class="absolute inset-0 z-0 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-slate-950 via-slate-900/80 to-transparent z-10"></div>
        <img src="https://images.unsplash.com/photo-1544256718-3bcf237f3974?q=80&w=2071" class="w-full h-full object-cover" alt="Ecole">
    </div>
    <div class="container mx-auto px-8 relative z-20" data-aos="fade-up">
      <h2 class="text-5xl md:text-7xl font-black text-white mb-6 leading-[1.1]">FORGER L'AVENIR<br><span class="text-blue-600">PAR L'EXCELLENCE.</span></h2>
      <a href="#compositions" class="bg-blue-700 text-white px-10 py-5 rounded-xl font-bold uppercase tracking-widest hover:bg-blue-600 transition inline-block">Consulter les listes</a>
    </div>
  </section>

  <section id="compositions" class="py-24 bg-slate-100 px-8">
    <div class="container mx-auto max-w-4xl text-center">
        <h3 class="text-blue-700 font-black uppercase tracking-widest text-[10px] mb-4">Espace Élèves</h3>
        <h4 class="text-4xl font-black mb-6 uppercase tracking-tighter">Retrouver ma Salle de Composition</h4>
        
        <div class="bg-white p-2 rounded-3xl shadow-2xl flex flex-col md:flex-row gap-2 border border-slate-200 mb-10">
            <input id="search-input" type="text" placeholder="Entrez votre nom complet..." class="flex-1 px-8 py-5 rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-700 transition font-bold text-lg">
            <button onclick="rechercherEleve()" class="bg-blue-900 text-white px-10 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 transition active:scale-95">Rechercher</button>
        </div>

        <div id="search-results" class="text-left max-w-2xl mx-auto space-y-4">
            </div>
    </div>
  </section>

  <footer class="bg-slate-950 text-white py-12 px-8">
    <div class="container mx-auto text-center border-t border-slate-900 pt-8">
      <p class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-700">
        © 2026 - Plateforme Officielle CEM 4 MBOUR - République du Sénégal
      </p>
    </div>
  </footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // Initialisation des animations au défilement
    AOS.init({ duration: 1000, once: true });

    // 1. CONNEXION À TA BASE DE DONNÉES SUPABASE
    // Remplace les valeurs ci-dessous par tes infos réelles
    const supabaseUrl = 'TON_URL_SUPABASE'; 
    const supabaseKey = 'TA_CLE_API_ANON';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. LOGIQUE DE RECHERCHE
    async function rechercherEleve() {
        const input = document.getElementById('search-input');
        const resultDiv = document.getElementById('search-results');
        const query = input.value.trim();

        // Si le champ est vide
        if(!query) {
            resultDiv.innerHTML = "<p class='text-amber-600 text-center font-bold text-xs uppercase tracking-widest'>Veuillez saisir un nom</p>";
            return;
        }

        // Afficher un loader pendant la recherche
        resultDiv.innerHTML = "<div class='flex justify-center'><div class='loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10'></div></div>";

        try {
            // Requête à Supabase sur la table 'compositions'
            const { data, error } = await _supabase
                .from('compositions')
                .select('*')
                .ilike('nom', `%${query}%`); // Recherche flexible (ne tient pas compte des majuscules)

            if (error) throw error;

            // Si on trouve des élèves
            if (data && data.length > 0) {
                resultDiv.innerHTML = data.map(eleve => `
                    <div class="bg-white p-6 rounded-2xl shadow-lg border-l-8 border-blue-700 transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <h5 class="font-black text-blue-900 text-xl uppercase">${eleve.nom}</h5>
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">${eleve.classe || 'N/A'}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-4 rounded-xl text-center">
                                <span class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Salle</span>
                                <span class="text-lg font-black text-slate-900">${eleve.salle}</span>
                            </div>
                            <div class="bg-blue-50 p-4 rounded-xl text-center">
                                <span class="block text-[10px] font-bold text-blue-400 uppercase mb-1">Table</span>
                                <span class="text-xl font-black text-blue-700">${eleve.numero_table}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                // Si aucun résultat n'est trouvé
                resultDiv.innerHTML = `<div class="bg-red-50 p-6 rounded-2xl border border-red-100 text-center text-red-600 font-bold uppercase text-xs">Aucun élève trouvé pour "${query}"</div>`;
            }
        } catch (err) {
            console.error("Erreur Supabase:", err);
            resultDiv.innerHTML = "<div class='text-red-500 text-center font-bold'>Erreur de connexion. Vérifiez vos clés API ou les droits RLS.</div>";
        }
    }

    // Permettre la recherche en appuyant sur la touche "Entrée"
    document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') rechercherEleve();
    });

    // Effet visuel sur la barre de navigation au défilement
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('main-nav');
      if (window.scrollY > 50) nav.classList.add('header-active');
      else nav.classList.remove('header-active');
    });
  </script>
</body>
</html>
